apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: order-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: mysql
        - name: KAFKA_HOST
          value: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: local
spec:
  ports:
  - port: 8080
  selector:
    app: order-service
