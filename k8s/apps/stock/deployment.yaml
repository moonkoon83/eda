apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-service
  namespace: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-service
  template:
    metadata:
      labels:
        app: stock-service
    spec:
      containers:
      - name: stock-service
        image: stock-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: DB_HOST
          value: mysql
        - name: KAFKA_HOST
          value: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: stock-service
  namespace: local
spec:
  ports:
  - port: 8081
  selector:
    app: stock-service
